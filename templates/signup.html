<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Smart Resume Analyzer</h1>

    <h2>Create Account</h2>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Enter Name"
            required
        >

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <br><br>

        <button type="submit">
            Sign Up
        </button>

    </form>

    <br>

    <a href="{{ url_for('login') }}">
        Already have an account? Login
    </a>

</div>

</body>
</html>
