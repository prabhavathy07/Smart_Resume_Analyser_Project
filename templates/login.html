<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Smart Resume Analyzer</h1>

    <h2>Login</h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="{{ url_for('signup') }}">
        Create New Account
    </a>

</div>

</body>
</html>
